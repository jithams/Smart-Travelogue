{% include 'admin_header.html'  %}
<div class="ftco-blocks-cover-1">
      <div class="site-section-cover overlay" style="background-image: url('/static/images/hero_1.jpg');height: 400px;">
        <div class="container">
          <div class="row align-items-center">
            <div class="col-md-5" data-aos="fade-right">
            	<br><br><br><br>
              <form method="post">
				<h2 style="color: #fff;">Manage Place Type</h2><br>
				<table style="color: #fff;width: 500px;" class="table">
					
					<tr>
						<th>Type Name</th>
						<td><input type="text" required class="form-control" style="height: 40px;" name="p_type"></td>
					</tr>
					<tr>
						<td colspan="2" align="center"><input type="submit" class="btn btn-success" name="type" value="ADD"></td>
					</tr>
				</table>
            </div>
          </div>
        </div>
      </div>
    </div>
<br><br><br>
<center>
<table class="table" style="width: 600px;">
	<h2>Type Details</h2><br>
	<tr>
		<th>Place Type</th>
	</tr>

	{% for row in data['view_type'] %}
	<tr>
		<td>{{ row['type_name'] }}</td>
		<td><a class="btn btn-danger" href="?action=delete&tid={{row['place_type_id']}}">Delete</a></td>
	</tr>
	{% endfor %}
</table>
	</center>
</form>
<br><br>
{% include 'footer.html' %}
